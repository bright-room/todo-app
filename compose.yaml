---
services:
  postgres:
    image: "postgres:latest"
    container_name: "todo-postgres"
    environment:
      POSTGRES_DB: "todo_app"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
    ports:
    - "5432:5432"
    volumes:
    - "postgres_data:/var/lib/postgresql/data"
    - "./docker/flyway/sql:/docker-entrypoint-initdb.d"
    networks:
    - "todo-network"
    healthcheck:
      test:
      - "CMD-SHELL"
      - "pg_isready -U postgres"
      interval: "10s"
      timeout: "5s"
      retries: 5
  backend:
    build:
      context: "."
      dockerfile: "docker/backend/Dockerfile"
    container_name: "todo-backend"
    ports:
    - "8080:8080"
    environment:
    - "DATABASE_URL=jdbc:postgresql://postgres:5432/todo_app"
    - "DATABASE_USER=postgres"
    - "DATABASE_PASSWORD=password"
    depends_on:
      postgres:
        condition: "service_healthy"
    networks:
    - "todo-network"
    volumes:
    - "./backend:/app/backend"
    restart: "unless-stopped"
  frontend:
    build:
      context: "."
      dockerfile: "docker/frontend/Dockerfile"
    container_name: "todo-frontend"
    ports:
    - "3000:80"
    depends_on:
    - "backend"
    networks:
    - "todo-network"
    volumes:
    - "./frontend:/app/frontend"
    restart: "unless-stopped"
  flyway:
    image: "flyway/flyway:latest"
    container_name: "todo-flyway"
    command: "-url=jdbc:postgresql://postgres:5432/todo_app -user=postgres -password=password\
      \ -connectRetries=60 migrate"
    volumes:
    - "./docker/flyway/sql:/flyway/sql"
    depends_on:
      postgres:
        condition: "service_healthy"
    networks:
    - "todo-network"
volumes:
  postgres_data: null
networks:
  todo-network:
    driver: "bridge"
